name: Build Render-Server Image

# Heavy Docker image (~1.7 GB: chromium + ffmpeg + node prod deps) is built
# in CI and pushed to GHCR so the local `wrangler deploy` only needs to
# pull, not build. Inspired by the openma sandbox-base pattern.
#
# Triggers:
#   - Pushes touching the render-server source or Dockerfile (auto-build
#     a new tag for that commit)
#   - workflow_dispatch (manual)

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'apps/render-server/**'
      - 'packages/remotion-core/**'
      - 'packages/remotion-components/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/build-render-image.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/render-server

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase image name
        id: img
        run: echo "name=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/render-server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Cloudflare Containers run on linux/amd64 only.
          platforms: linux/amd64
          # Mirrors that speed up apt + npm in CN regions; safe to keep on
          # international runners — the upstream URLs are CDN'd globally.
          build-args: |
            NPM_REGISTRY=https://registry.npmjs.org/
