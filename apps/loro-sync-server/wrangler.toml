name = "loro-sync-server"
main = "src/index.ts"
compatibility_date = "2024-11-20"
compatibility_flags = ["nodejs_compat"]

# Enable Workers Observability for Logpush
[observability]
enabled = true
head_sampling_rate = 1  # 100% sampling for dev, reduce in production

# Durable Objects bindings
[[durable_objects.bindings]]
name = "LORO_ROOM"
class_name = "LoroRoom"

[[d1_databases]]
binding = "DB"
database_name = "lightpick-d1"
database_id = "00000000-0000-0000-0000-000000000000"  # Replace with your D1 id (`wrangler d1 create lightpick-d1` prints it)

# R2 bucket for generated assets
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "lightpick-r2"

# Environment variables
[vars]
BETTER_AUTH_BASE_PATH = "/api/better-auth"
ENVIRONMENT = "development"

# Development environment
[env.development]
vars = { ENVIRONMENT = "development" }

# Production environment
[env.production]
vars = { ENVIRONMENT = "production" }

# Service Bindings
[[services]]
binding = "API_CF"
service = "lightpick-api"

[dev]
# (no extra dev config needed)

# Durable Object migrations
[[migrations]]
tag = "v1"
new_classes = ["LoroRoom"]
