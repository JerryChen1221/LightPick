#:schema node_modules/wrangler/config-schema.json
name = "lightpick-api"
main = "src/index.ts"
compatibility_date = "2025-03-14"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Durable Objects
[[durable_objects.bindings]]
name = "ROOM"
class_name = "ProjectRoom"

[[durable_objects.bindings]]
name = "SUPERVISOR"
class_name = "SupervisorAgent"

# Workflow
[[workflows]]
name = "generation-workflow"
binding = "GENERATION_WORKFLOW"
class_name = "GenerationWorkflow"

# Container (Remotion render server)
# Uses Dockerfile.cf which `FROM ghcr.io/lightpick-space/render-server:latest` —
# the heavy multi-stage build runs in CI (build-render-image.yml), pushed
# to GHCR. Local `wrangler deploy` just pulls the prebuilt layer instead
# of churning through node-prod-deps + chromium + ffmpeg locally.
[[containers]]
class_name = "RenderContainer"
image = "../render-server/Dockerfile.cf"
image_build_context = "../.."
max_instances = 3

[[durable_objects.bindings]]
name = "RENDER_CONTAINER"
class_name = "RenderContainer"

[[durable_objects.bindings]]
name = "BYO_BRIDGE"
class_name = "ByoBridgeRoom"

[[durable_objects.bindings]]
name = "RUNTIME_ROOM"
class_name = "RuntimeRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SupervisorAgent"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["GenerationAgent"]

[[migrations]]
tag = "v3"
renamed_classes = [{from = "SupervisorAgent", to = "ProjectRoom"}]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["SupervisorAgent"]

[[migrations]]
tag = "v5"
deleted_classes = ["GenerationAgent"]

[[migrations]]
tag = "v6"
new_sqlite_classes = ["RenderContainer"]

[[migrations]]
tag = "v7"
new_sqlite_classes = ["ByoBridgeRoom"]

[[migrations]]
tag = "v8"
new_sqlite_classes = ["RuntimeRoom"]

# Workers AI
[ai]
binding = "AI"

# D1 Database (shared with frontend)
[[d1_databases]]
binding = "DB"
database_name = "lightpick-d1"
database_id = "00000000-0000-0000-0000-000000000000"  # Replace with your D1 id (`wrangler d1 create lightpick-d1` prints it)

# R2 Bucket
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "lightpick-r2"

# Environment variables (set via `wrangler secret put`)
# GOOGLE_API_KEY
# GOOGLE_AI_STUDIO_BASE_URL
# CF_AIG_TOKEN
# CF_AIG_OPENAI_URL
# KLING_ACCESS_KEY
# KLING_SECRET_KEY
# KLING_API_URL (optional, defaults to Beijing endpoint)
# R2_PUBLIC_URL
# JWT_SECRET
# BETTER_AUTH_ORIGIN
# WORKER_PUBLIC_URL

[dev]
# Only watch src/ to prevent .wrangler/state sqlite writes from triggering reload loops
watch_dir = "src"
# Containers off for local dev — thumbnail/render dispatch goes via
# RENDER_SERVER_URL to a standalone tsx process on :8080 (see Makefile
# dev-render target). Prod deploys without RENDER_SERVER_URL so the Worker
# falls through to the RENDER_CONTAINER binding.
enable_containers = false

[vars]
ENVIRONMENT = "development"
BETTER_AUTH_BASE_PATH = "/api/better-auth"
RENDER_SERVER_URL = "http://localhost:8080"
# Base origin for signed asset URLs handed to render-server so its ffmpeg
# can fetch source videos over HTTP.
#   Dev:  gateway worker on :3000 (same host as the tsx render-server).
#   Prod: override with the public zone URL so the Container (running in
#         Cloudflare infra) can reach the zone over the internet.
MEDIA_GATEWAY_URL = "http://localhost:3000"

# ╔══════════════════════════════════════════════════════════════════╗
# ║  [env.staging] — lane-style staging.                             ║
# ║  Staging worker carries the new code but DELEGATES all stateful  ║
# ║  bindings (DOs, Container, Workflow, D1, R2) to the existing     ║
# ║  PRODUCTION worker `lightpick-api`. No new DO classes are     ║
# ║  declared here, so there's no migration, no container build,     ║
# ║  no schema churn — wrangler just uploads the new worker code.    ║
# ║                                                                   ║
# ║  DO NOT COMMIT this section upstream — it embeds prod resource   ║
# ║  identifiers. The OSS template should keep placeholders only.    ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# Deploy with:  wrangler deploy --env staging   (or `make deploy-api-staging`)
[env.staging]
name = "lightpick-api-staging"

[env.staging.observability]
enabled = true

[env.staging.ai]
binding = "AI"

# Cross-script DO bindings — `script_name` points at the prod worker so all
# DO state (sessions, presence, generated assets) lives in a single place
# regardless of which worker version handled the request.
[[env.staging.durable_objects.bindings]]
name = "ROOM"
class_name = "ProjectRoom"
script_name = "lightpick-api"

[[env.staging.durable_objects.bindings]]
name = "SUPERVISOR"
class_name = "SupervisorAgent"
script_name = "lightpick-api"

[[env.staging.durable_objects.bindings]]
name = "RENDER_CONTAINER"
class_name = "RenderContainer"
script_name = "lightpick-api"

[[env.staging.durable_objects.bindings]]
name = "BYO_BRIDGE"
class_name = "ByoBridgeRoom"
script_name = "lightpick-api"

[[env.staging.durable_objects.bindings]]
name = "RUNTIME_ROOM"
class_name = "RuntimeRoom"
script_name = "lightpick-api"

# Workflow lives in the prod worker too — bind by reference, no new instance.
[[env.staging.workflows]]
name = "generation-workflow"
binding = "GENERATION_WORKFLOW"
class_name = "GenerationWorkflow"
script_name = "lightpick-api"

# Same prod data. (D1 + R2 are account-scoped; bind by id/name.)
[[env.staging.d1_databases]]
binding = "DB"
database_name = "lightpick-frontend"
database_id = "aab16eeb-a375-490b-ad1e-cd092cd9f4bb"

[[env.staging.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "lightpick-assets"

[env.staging.vars]
ENVIRONMENT = "staging"
BETTER_AUTH_BASE_PATH = "/api/better-auth"
# Wrangler refuses to inherit top-level vars into env sections, so we redeclare
# explicitly (empty = falls through to RENDER_CONTAINER DO at runtime).
RENDER_SERVER_URL = ""
MEDIA_GATEWAY_URL = ""
